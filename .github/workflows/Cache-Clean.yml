# 缓存清理工作流
# 功能：定期清理GitHub Actions缓存，防止缓存堆积

name: Cache-Clean

on:
  # 自动清理：每周日UTC 20:00（北京时间周一早上4点）
  schedule:
    - cron: 0 20 * * 0
  # 手动清理
  workflow_dispatch:

permissions: write-all

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Projects
        uses: actions/checkout@v6.0.2

      - name: Cache Clean
        run: |
          echo "========开始清理缓存========"
          # 显示所有缓存
          gh cache list
          
          echo "========执行清理========"
          # 删除所有缓存
          gh cache delete --all || true
          
          echo "========清理完成========"
          gh cache list
