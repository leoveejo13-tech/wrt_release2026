name: Build WRT
run-name: Build - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - aliyun_ap8220_immwrt
          - cmcc_rax3000m_immwrt
          - gemtek_w1701k_immwrt
          - jdcloud_ax6000_immwrt
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - link_nn6000v2_immwrt
          - linksys_mx4x00_immwrt
          - qihoo_360v6_immwrt
          - redmi_ax5_immwrt
          - redmi_ax6_immwrt
          - redmi_ax6_libwrt
          - redmi_ax6000_immwrt21
          - zn_m2_immwrt
          - zn_m2_libwrt
          - x64_immwrt
          - MEDIATEK-WIFI-NO
          - MEDIATEK-WIFI-YES
      clean_cache:
        description: '清理旧缓存（构建前）'
        default: false
        required: false
        type: boolean

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    
    outputs:
      build_date: ${{ steps.set-date.outputs.build_date }}

    steps:
      - name: Build System Setup
        run: |
          # 清理磁盘空间
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          sudo docker image prune -a -f 2>/dev/null || true
          
          # 安装编译环境
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload
          
          echo "========初始磁盘空间========"
          df -h
          echo "============================"

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set Build Date and Timezone
        id: set-date
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

      - name: Clean Old Caches (Optional)
        if: inputs.clean_cache == true
        run: |
          echo "========清理旧缓存========"
          gh cache list --key ${{ matrix.os }}-${{ inputs.model }}- || true
          gh cache list --key ${{ matrix.os }}-${{ inputs.model }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key" || true
          done
          echo "========缓存清理完成========"

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      - name: Cache Dependencies
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ inputs.model }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ inputs.model }}-${{ hashFiles('**/repo_flag') }}-
            ${{ matrix.os }}-${{ inputs.model }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Machine Information (Pre-build)
        run: |
          echo "=============== Pre-build Snapshot ==============="
          echo "设备: ${{ inputs.model }}"
          echo "Time: $(date '+%F %T %Z')"
          echo "=================================================="
          echo "[Disk]"
          df -hT
          echo "=================================================="

      - name: Build Firmware
        run: ./build.sh ${{ inputs.model }}

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v6
        with:
          name: firmware_${{ inputs.model }}_${{ env.BUILD_DATE }}
          path: ./firmware/*
          retention-days: 1
          compression-level: 9
          if-no-files-found: error

      - name: Machine Information (Post-build)
        run: |
          echo "=============== Post-build Snapshot ==============="
          echo "设备: ${{ inputs.model }}"
          echo "=================================================="
          echo "[Disk]"
          df -hT
          echo "===================================================="

  upload:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Firmware Artifact
        uses: actions/download-artifact@v6
        with:
          name: firmware_${{ inputs.model }}_${{ needs.build.outputs.build_date }}
          path: ./firmware

      - name: Check Firmware
        run: |
          echo "========下载的固件========"
          ls -lh ./firmware/
          UPLOAD_SIZE=$(du -sm ./firmware 2>/dev/null | cut -f1)
          echo "上传大小: ${UPLOAD_SIZE}MB"
          echo "========================"

      - name: Delete Old Cache
        run: |
          echo "========清理过期缓存========"
          # 删除所有旧缓存（当前正在使用的缓存会因为锁定而跳过）
          gh cache list --key ubuntu-24.04-${{ inputs.model }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key" 2>/dev/null || true
          done
          echo "缓存清理完成"

      - name: Upload to Artifact (Long-term)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ needs.build.outputs.build_date }}_${{ inputs.model }}
          path: ./firmware/*
          retention-days: 7
          compression-level: 9
