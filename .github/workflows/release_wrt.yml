name: Release WRT
run-name: Release - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - aliyun_ap8220_immwrt
          - cmcc_rax3000m_immwrt
          - gemtek_w1701k_immwrt
          - jdcloud_ax6000_immwrt
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - link_nn6000v2_immwrt
          - linksys_mx4x00_immwrt
          - n1_immwrt
          - qihoo_360v6_immwrt
          - redmi_ax5_immwrt
          - redmi_ax6_immwrt
          - redmi_ax6_libwrt
          - redmi_ax6000_immwrt21
          - zn_m2_immwrt
          - zn_m2_libwrt
          - x64_immwrt
          - MEDIATEK-WIFI-NO
          - MEDIATEK-WIFI-YES

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    
    outputs:
      build_date: ${{ steps.set-date.outputs.build_date }}
      build_src: ${{ steps.set-date.outputs.build_src }}
      kernel_ver: ${{ steps.get-kver.outputs.kernel_ver }}

    steps:
      - name: Build System Setup
        run: |
          # 清理磁盘空间
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          sudo docker image prune -a -f 2>/dev/null || true
          
          # 安装编译环境
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload
          
          echo "========初始磁盘空间========"
          df -h
          echo "============================"

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set Build Date and Timezone
        id: set-date
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          
          BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./wrt_core/compilecfg/${{ inputs.model }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV
          echo "build_src=$BUILD_SRC" >> $GITHUB_OUTPUT

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      - name: Cache Dependencies
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ inputs.model }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ inputs.model }}-${{ hashFiles('**/repo_flag') }}-
            ${{ matrix.os }}-${{ inputs.model }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Machine Information (Pre-build)
        run: |
          echo "=============== Pre-build Snapshot ==============="
          echo "设备: ${{ inputs.model }}"
          echo "Time: $(date '+%F %T %Z')"
          echo "=================================================="
          echo "[Disk]"
          df -hT
          echo "=================================================="

      - name: Build Firmware
        run: ./build.sh ${{ inputs.model }}

      - name: Check Firmware
        run: |
          echo "========固件检查========"
          ls -lh ./firmware/
          FIRMWARE_SIZE=$(du -sm ./firmware 2>/dev/null | cut -f1)
          FIRMWARE_COUNT=$(find ./firmware -type f -name "*sysupgrade*" 2>/dev/null | wc -l)
          echo "固件数量: ${FIRMWARE_COUNT}"
          echo "固件总大小: ${FIRMWARE_SIZE}MB"
          echo "======================="

      - name: Get Kernel Verion
        id: get-kver
        run: |
          # 获取内核版本
          KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}" | head -1)
          echo "KVER=$KVER" >> $GITHUB_ENV
          echo "kernel_ver=$KVER" >> $GITHUB_OUTPUT
          echo "Kernel version: $KVER"

      - name: Delete Old Cache
        run: |
          echo "========清理过期缓存========"
          # 删除所有旧缓存（当前正在使用的缓存会因为锁定而跳过）
          gh cache list --key ${{ matrix.os }}-${{ inputs.model }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key" 2>/dev/null || true
          done
          
          # 输出缓存状态
          echo "========当前缓存状态========"
          if [ -d "./action_build/.ccache" ]; then
            echo "ccache: $(du -sh ./action_build/.ccache 2>/dev/null | cut -f 1 || echo '0')"
          fi
          if [ -d "./action_build/staging_dir" ]; then
            echo "staging: $(du -sh ./action_build/staging_dir 2>/dev/null | cut -f 1 || echo '0')"
          fi
          echo "============================="

      - name: Machine Information (Post-build)
        run: |
          echo "=============== Post-build Snapshot ==============="
          echo "设备: ${{ inputs.model }}"
          echo "=================================================="
          echo "[Disk]"
          df -hT
          echo "===================================================="

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v6
        with:
          name: firmware_${{ inputs.model }}_${{ env.BUILD_DATE }}
          path: ./firmware/*
          retention-days: 1
          compression-level: 9
          if-no-files-found: error

      - name: Clean Build Files
        if: always()
        run: |
          echo "========清理构建文件========"
          if [ -d "./action_build" ]; then
            cd ./action_build
            # 清理下载的源码包（可重新下载）
            rm -rf dl/ 2>/dev/null || true
            # 清理编译输出（除了固件）
            find ./bin -type f ! -name "*.bin" ! -name "*.img" ! -name "*.gz" -delete 2>/dev/null || true
            # 清理临时文件
            rm -rf tmp/ 2>/dev/null || true
            rm -rf logs/ 2>/dev/null || true
          fi
          
          echo "========磁盘使用情况========"
          df -h
          echo "============================"

  upload:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download Firmware Artifact
        uses: actions/download-artifact@v6
        with:
          name: firmware_${{ inputs.model }}_${{ needs.build.outputs.build_date }}
          path: ./firmware

      - name: Package OpenWrt Firmware
        if: ${{ inputs.model == 'n1_immwrt' }}
        uses: unifreq/openwrt_packit@master
        env:
          OPENWRT_ARMVIRT: firmware/*.tar.gz
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: 6.6.y
          WHOAMI: ZqinKing

      - name: Prepare Release Body
        run: |
          echo "云编译发布" > release_body.txt
          echo "源码：${{ needs.build.outputs.build_src }}" >> release_body.txt
          echo "Kernel: ${{ needs.build.outputs.kernel_ver }}" >> release_body.txt
          echo "WIFI密码: 12345678" >> release_body.txt
          echo "LAN地址: 192.168.1.1" >> release_body.txt
          echo "插件：" >> release_body.txt
          grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest 2>/dev/null | awk -F":" '{print $NF}' >> release_body.txt || echo "N/A" >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ needs.build.outputs.build_date }}_${{ inputs.model }}
          files: ${{ inputs.model == 'n1_immwrt' && env.PACKAGED_OUTPUTPATH || './firmware' }}/*.*
          body_path: ./release_body.txt
