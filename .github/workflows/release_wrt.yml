name: Release WRT
run-name: Release - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - aliyun_ap8220_immwrt
          - cmcc_rax3000m_immwrt
          - gemtek_w1701k_immwrt
          - jdcloud_ax6000_immwrt
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - link_nn6000v2_immwrt
          - linksys_mx4x00_immwrt
          - n1_immwrt
          - qihoo_360v6_immwrt
          - redmi_ax5_immwrt
          - redmi_ax6_immwrt
          - redmi_ax6_libwrt
          - redmi_ax6000_immwrt21
          - zn_m2_immwrt
          - zn_m2_libwrt
          - x64_immwrt
          - MEDIATEK-WIFI-NO
          - MEDIATEK-WIFI-YES

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./wrt_core/compilecfg/${{ inputs.model }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      - name: Cache Dependencies
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ inputs.model }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ inputs.model }}-${{ hashFiles('**/repo_flag') }}-
            ${{ matrix.os }}-${{ inputs.model }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Machine Information (Pre-build)
        run: |
          echo "=============== Pre-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "=================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "=================================================="
          echo "[Memory]"
          free -h
          echo "=================================================="
          echo "[Disk]"
          df -hT
          echo "--------------------------------------------------"
          df -hi
          echo "=================================================="
          echo "[Workspace]"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "=================================================="

      - name: Build Firmware
        run: ./build.sh ${{ inputs.model }}

      - name: Filter and Package Firmware
        run: |
          echo "========过滤固件文件========"
          mkdir -p ./firmware_filtered
          
          if [ -d "./firmware" ]; then
            cd ./firmware
            
            echo "========原始固件列表========"
            ls -lh
            
            echo "========开始过滤========"
            # 只保留 .bin 和 .itb 后缀的刷机包
            # 排除: gpt、rootfs、kernel等中间文件
            
            # 保留所有.bin文件（squashfs、factory、sysupgrade等）
            find . -type f -name "*.bin" -exec cp {} ../firmware_filtered/ \;
            
            # 保留所有.itb文件
            find . -type f -name "*.itb" -exec cp {} ../firmware_filtered/ \;
            
            # 保留manifest文件（用于获取内核版本和插件列表）
            find . -type f -name "*.manifest" -exec cp {} ../firmware_filtered/ \;
            
            # 如果是n1设备，保留tar.gz文件
            if [[ "${{ inputs.model }}" == "n1_immwrt" ]]; then
              find . -type f -name "*.tar.gz" -exec cp {} ../firmware_filtered/ \;
            fi
            
            cd ..
            
            echo "========过滤后固件列表========"
            ls -lh ./firmware_filtered/
            
            # 计算固件总大小
            FIRMWARE_SIZE=$(du -sm ./firmware_filtered 2>/dev/null | cut -f1)
            FIRMWARE_COUNT=$(find ./firmware_filtered -type f \( -name "*.bin" -o -name "*.itb" \) 2>/dev/null | wc -l)
            
            echo "========固件统计========"
            echo "固件数量: ${FIRMWARE_COUNT}"
            echo "固件总大小: ${FIRMWARE_SIZE}MB"
            
            # 如果固件超过1GB，发出警告
            if [ $FIRMWARE_SIZE -gt 1024 ]; then
              echo "⚠️ 警告: 固件总大小超过1GB (${FIRMWARE_SIZE}MB)"
              echo "建议减少config中启用的设备数量或插件"
            fi
            
            # 替换firmware目录
            rm -rf ./firmware
            mv ./firmware_filtered ./firmware
            
            echo "========固件过滤完成========"
            echo "保留文件: *.bin, *.itb, *.manifest"
          else
            echo "❌ 错误: firmware目录不存在"
            exit 1
          fi

      - name: Get Kernel Verion
        run: |
          # 获取内核版本
          echo "KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")" >> $GITHUB_ENV

      - name: Delete Old Cache
        run: |
          echo "========清理过期缓存========"
          # 只删除相同model的旧缓存，保留其他model的缓存
          gh cache list --key ${{ matrix.os }}-${{ inputs.model }}- --json key --jq '.[] | .key' | while read -r key; do
            # 跳过当前构建的缓存key
            if [[ "$key" != "${{ matrix.os }}-${{ inputs.model }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}" ]]; then
              gh cache delete "$key" || true
            fi
          done
          
          # 输出缓存状态
          echo "========当前缓存状态========"
          if [ -d "./action_build/.ccache" ]; then
            echo "ccache: $(du -sh ./action_build/.ccache 2>/dev/null | cut -f 1 || echo '0')"
          fi
          if [ -d "./action_build/staging_dir" ]; then
            echo "staging: $(du -sh ./action_build/staging_dir 2>/dev/null | cut -f 1 || echo '0')"
          fi
          echo "============================="

      - name: Machine Information (Post-build)
        run: |
          echo "=============== Post-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "===================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "===================================================="
          echo "[Memory]"
          free -h
          echo "===================================================="
          echo "[Disk]"
          df -hT
          echo "----------------------------------------------------"
          df -hi
          echo "===================================================="
          echo "[Build Outputs]"
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "Firmware file count: $(ls -1 ./firmware 2>/dev/null | wc -l)"
          echo "===================================================="

      - name: Package OpenWrt Firmware
        if: ${{ inputs.model == 'n1_immwrt' }}
        uses: unifreq/openwrt_packit@master
        env:
          OPENWRT_ARMVIRT: firmware/*.tar.gz
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: 6.6.y
          WHOAMI: ZqinKing

      - name: Prepare Release Body
        run: |
          echo "云编译发布" > release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "Kernel: ${{ env.KVER }}" >> release_body.txt
          echo "WIFI密码: 12345678" >> release_body.txt
          echo "LAN地址: 192.168.1.1" >> release_body.txt
          echo "插件：" >> release_body.txt
          echo "$(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest | awk -F":" '{print $NF}')"  >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          files: ${{ inputs.model == 'n1_immwrt' && env.PACKAGED_OUTPUTPATH || './firmware' }}/*.*
          body_path: ./release_body.txt

      - name: Clean Build Files
        if: always()
        run: |
          echo "========清理构建文件========"
          if [ -d "./action_build" ]; then
            cd ./action_build
            # 清理下载的源码包（可重新下载）
            rm -rf dl/ 2>/dev/null || true
            # 清理编译输出（除了固件）
            find ./bin -type f ! -name "*.bin" ! -name "*.img" ! -name "*.gz" -delete 2>/dev/null || true
            # 清理临时文件
            rm -rf tmp/ 2>/dev/null || true
            rm -rf logs/ 2>/dev/null || true
          fi
          
          echo "========磁盘使用情况========"
          df -h
          echo "============================"
